<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f5f5f5] h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-[24px] shadow-[0_2px_8px_rgba(0,0,0,0.04)] w-full max-w-sm">
        <div class="mb-8">
            <h1 class="text-2xl font-semibold text-[#1a1a1a] mb-2">Administration</h1>
            <p class="text-sm text-[#9e9e9e]">Veuillez saisir votre mot de passe pour accéder au tableau de bord.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-[#9e9e9e] mb-2">Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-gray-200 transition-all text-sm"
                    placeholder="••••••••"
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-[#1a1a1a] text-white py-3 rounded-xl font-medium text-sm hover:bg-[#333] transition-colors active:scale-[0.98] transform transition-transform"
            >
                Se connecter
            </button>
            <p id="error" class="text-xs text-red-500 text-center hidden"></p>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Erreur de connexion';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur réseau';
                errorEl.classList.remove('hidden');
            }
        });

        // Check if already logged in
        fetch('/api/check-auth').then(res => {
            if (res.ok) window.location.href = '/admin/dashboard.html';
        });
    </script>
</body>
</html>
