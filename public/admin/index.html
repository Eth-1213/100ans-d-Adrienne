<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .pin-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 0.75rem;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            font-weight: 500;
            color: #fff1f2;
            transition: all 0.2s;
            cursor: pointer;
        }
        @media (min-width: 640px) {
            .pin-btn {
                border-radius: 1rem;
                font-size: 1.5rem;
            }
        }
        .pin-btn:hover { 
            background-color: rgba(255, 255, 255, 0.1); 
            transform: scale(1.1);
        }
        .pin-btn:active { transform: scale(0.9); }
        
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        
        .transition-all { transition: all 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.8s cubic-bezier(0.68, -0.6, 0.32, 1.6) forwards; }
    </style>
</head>
<body class="bg-[#0a0502] min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    <script>
        // Check if already logged in and auto-redirect if so
        // But only if we are NOT already in the process of logging in
        if (location.search !== '?login') {
            fetch('/api/check-auth').then(res => {
                if (res.ok) window.location.href = '/admin/dashboard.html';
            });
        }
    </script>
    <!-- Atmospheric background -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-rose-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rose-500/10 blur-[120px] rounded-full"></div>
    </div>

    <!-- Splash Screen -->
    <div id="splashContainer" class="relative z-20 flex flex-col items-center">
        <div class="mb-12 text-center animate-fade-in">
            <div class="inline-flex p-6 rounded-3xl bg-rose-500/10 text-rose-200 border border-rose-500/20 mb-8 shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h1 class="text-4xl sm:text-6xl font-serif font-bold text-rose-50 mb-4 tracking-tighter">Accès Restreint</h1>
            <p class="text-rose-200/40 uppercase tracking-[0.4em] text-xs font-bold">Administration Privée</p>
        </div>
        
        <button 
            id="startAdminBtn"
            class="px-12 py-6 bg-rose-500/20 hover:bg-rose-500/30 border border-rose-500/40 text-rose-50 font-serif text-2xl rounded-[2.5rem] transition-all flex items-center justify-center gap-4 shadow-2xl group active:scale-95"
        >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:rotate-12 transition-transform"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
            Ouvrir le panneau
        </button>
    </div>

    <div id="authContainer" class="hidden relative bg-white/5 backdrop-blur-2xl p-6 sm:p-10 rounded-[2rem] sm:rounded-[2.5rem] border border-white/10 shadow-2xl w-full max-w-sm sm:max-w-md text-center">
        <div class="mb-6 sm:mb-10">
            <div class="inline-flex p-3 sm:p-4 rounded-xl sm:rounded-2xl bg-rose-500/10 text-rose-200 border border-rose-500/20 mb-4 sm:mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 sm:w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl sm:text-3xl font-serif font-bold text-rose-50 mb-2 sm:mb-3 tracking-tight">Espace Confidentiel</h1>
            <p class="text-xs sm:text-sm text-rose-200/60 font-medium italic">Administration - Adrienne 100 ans</p>
        </div>

        <form id="loginForm" class="space-y-6 sm:space-y-8">
            <div class="text-left">
                <label for="password" class="block text-[10px] sm:text-xs font-semibold uppercase tracking-[0.2em] text-rose-200/50 mb-2 sm:mb-3 ml-1">Clé d'accès</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        readonly
                        required 
                        class="w-full px-4 sm:px-6 py-3 sm:py-4 rounded-xl sm:rounded-2xl bg-white/5 border border-white/10 text-rose-50 text-center tracking-[0.8em] sm:tracking-[1em] focus:bg-white/10 focus:outline-none transition-all text-xl sm:text-2xl placeholder-rose-200/20"
                        placeholder="••••"
                    >
                </div>
            </div>

            <!-- Custom Numeric Keypad -->
            <div id="keypad" class="grid grid-cols-3 gap-3 sm:gap-4 max-w-[240px] sm:max-w-[280px] mx-auto">
                <button type="button" onclick="appendPin('1')" class="pin-btn">1</button>
                <button type="button" onclick="appendPin('2')" class="pin-btn">2</button>
                <button type="button" onclick="appendPin('3')" class="pin-btn">3</button>
                <button type="button" onclick="appendPin('4')" class="pin-btn">4</button>
                <button type="button" onclick="appendPin('5')" class="pin-btn">5</button>
                <button type="button" onclick="appendPin('6')" class="pin-btn">6</button>
                <button type="button" onclick="appendPin('7')" class="pin-btn">7</button>
                <button type="button" onclick="appendPin('8')" class="pin-btn">8</button>
                <button type="button" onclick="appendPin('9')" class="pin-btn">9</button>
                <button type="submit" class="w-full aspect-square rounded-xl sm:rounded-2xl bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-xs sm:text-sm font-bold uppercase tracking-widest text-rose-200 hover:bg-rose-500/20 active:scale-95 transition-all">OK</button>
                <button type="button" onclick="appendPin('0')" class="pin-btn">0</button>
                <button type="button" onclick="backspacePin()" class="w-full aspect-square rounded-xl sm:rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-rose-400/60 hover:bg-rose-400/10 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 sm:w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                </button>
            </div>

            <button 
                type="submit" 
                class="w-full bg-rose-500/20 hover:bg-rose-500/40 text-rose-100 border border-rose-500/40 py-4 sm:py-5 rounded-xl sm:rounded-2xl font-bold uppercase tracking-[0.2em] text-[10px] sm:text-xs transition-all active:scale-[0.98] shadow-xl"
            >
                Déverrouiller
            </button>
            <p id="error" class="text-sm text-rose-400 font-medium text-center hidden"></p>
        </form>
    </div>

    <script>
        const splashContainer = document.getElementById('splashContainer');
        const authContainer = document.getElementById('authContainer');
        const startAdminBtn = document.getElementById('startAdminBtn');
        const passwordInput = document.getElementById('password');
        const errorEl = document.getElementById('error');

        startAdminBtn.addEventListener('click', () => {
            // Transition UI
            splashContainer.style.opacity = '0';
            splashContainer.style.transform = 'translateY(-20px)';
            splashContainer.style.transition = 'all 0.5s ease-out';
            
            setTimeout(() => {
                splashContainer.classList.add('hidden');
                authContainer.classList.remove('hidden');
                authContainer.classList.add('animate-fade-in');
            }, 500);
        });

        window.appendPin = (val) => {
            if (passwordInput.value.length < 12) {
                passwordInput.value += val;
                errorEl.classList.add('hidden');
            }
        };

        window.backspacePin = () => {
            passwordInput.value = passwordInput.value.slice(0, -1);
        };

        const form = document.getElementById('loginForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                let data;
                const text = await res.text();
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    console.error('Server response was not JSON:', text);
                    data = { error: `Le serveur a renvoyé une réponse invalide (non-JSON). Statut: ${res.status}` };
                }

                if (res.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Erreur de connexion';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Login error:', err);
                errorEl.textContent = 'Erreur réseau. Vérifiez votre connexion ou les paramètres du serveur.';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
