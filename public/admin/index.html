<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .pin-btn {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 1rem;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 500;
            color: #fff1f2;
            transition: all 0.2s;
            cursor: pointer;
        }
        .pin-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .pin-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#0a0502] min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    <!-- Atmospheric background -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-rose-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rose-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative bg-white/5 backdrop-blur-2xl p-10 rounded-[2.5rem] border border-white/10 shadow-2xl w-full max-w-md text-center">
        <div class="mb-10">
            <div class="inline-flex p-4 rounded-2xl bg-rose-500/10 text-rose-200 border border-rose-500/20 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-serif font-bold text-rose-50 mb-3 tracking-tight">Espace Confidentiel</h1>
            <p class="text-rose-200/60 font-medium italic">Administration - Adrienne 100 ans</p>
        </div>

        <form id="loginForm" class="space-y-8">
            <div class="text-left">
                <label for="password" class="block text-xs font-semibold uppercase tracking-[0.2em] text-rose-200/50 mb-3 ml-1">Clé d'accès</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        readonly
                        required 
                        class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 text-rose-50 text-center tracking-[1em] focus:bg-white/10 focus:outline-none focus:ring-2 focus:ring-rose-200/20 transition-all text-2xl placeholder-rose-200/20"
                        placeholder="••••"
                    >
                </div>
            </div>

            <!-- Custom Numeric Keypad -->
            <div id="keypad" class="grid grid-cols-3 gap-4 max-w-[280px] mx-auto">
                <button type="button" onclick="appendPin('1')" class="pin-btn">1</button>
                <button type="button" onclick="appendPin('2')" class="pin-btn">2</button>
                <button type="button" onclick="appendPin('3')" class="pin-btn">3</button>
                <button type="button" onclick="appendPin('4')" class="pin-btn">4</button>
                <button type="button" onclick="appendPin('5')" class="pin-btn">5</button>
                <button type="button" onclick="appendPin('6')" class="pin-btn">6</button>
                <button type="button" onclick="appendPin('7')" class="pin-btn">7</button>
                <button type="button" onclick="appendPin('8')" class="pin-btn">8</button>
                <button type="button" onclick="appendPin('9')" class="pin-btn">9</button>
                <button type="button" onclick="clearPin()" class="w-full aspect-square rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-[10px] font-bold uppercase tracking-widest text-rose-400/60 hover:bg-rose-400/10 active:scale-95 transition-all">Effacer</button>
                <button type="button" onclick="appendPin('0')" class="pin-btn">0</button>
                <button type="button" onclick="backspacePin()" class="w-full aspect-square rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-rose-400/60 hover:bg-rose-400/10 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                </button>
            </div>

            <button 
                type="submit" 
                class="w-full bg-rose-500/20 hover:bg-rose-500/40 text-rose-100 border border-rose-500/40 py-5 rounded-2xl font-bold uppercase tracking-[0.2em] text-xs transition-all active:scale-[0.98] shadow-xl"
            >
                Déverrouiller
            </button>
            <p id="error" class="text-sm text-rose-400 font-medium text-center hidden"></p>
        </form>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const errorEl = document.getElementById('error');

        window.appendPin = (val) => {
            if (passwordInput.value.length < 12) {
                passwordInput.value += val;
                errorEl.classList.add('hidden');
            }
        };

        window.clearPin = () => {
            passwordInput.value = '';
        };

        window.backspacePin = () => {
            passwordInput.value = passwordInput.value.slice(0, -1);
        };

        const form = document.getElementById('loginForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Erreur de connexion';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur réseau';
                errorEl.classList.remove('hidden');
            }
        });

        // Check if already logged in
        fetch('/api/check-auth').then(res => {
            if (res.ok) window.location.href = '/admin/dashboard.html';
        });
    </script>
</body>
</html>
