<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0a0502] min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    <!-- Atmospheric background -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-rose-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rose-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="relative bg-white/5 backdrop-blur-2xl p-10 rounded-[2.5rem] border border-white/10 shadow-2xl w-full max-w-md text-center">
        <div class="mb-10">
            <div class="inline-flex p-4 rounded-2xl bg-rose-500/10 text-rose-200 border border-rose-500/20 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-serif font-bold text-rose-50 mb-3 tracking-tight">Espace Confidentiel</h1>
            <p class="text-rose-200/60 font-medium italic">Administration - Adrienne 100 ans</p>
        </div>

        <form id="loginForm" class="space-y-8">
            <div class="text-left">
                <label for="password" class="block text-xs font-semibold uppercase tracking-[0.2em] text-rose-200/50 mb-3 ml-1">Clé d'accès</label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    inputmode="numeric"
                    pattern="[0-9]*"
                    class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 text-rose-50 focus:bg-white/10 focus:outline-none focus:ring-2 focus:ring-rose-200/20 transition-all text-lg placeholder-rose-200/20"
                    placeholder="••••"
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-rose-500/20 hover:bg-rose-500/30 text-rose-100 border border-rose-500/30 py-4 rounded-2xl font-semibold uppercase tracking-[0.2em] text-xs transition-all active:scale-[0.98] shadow-[0_0_20px_rgba(244,63,94,0.1)]"
            >
                Déverrouiller
            </button>
            <p id="error" class="text-sm text-rose-400 font-medium text-center hidden"></p>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorEl.textContent = data.error || 'Erreur de connexion';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.textContent = 'Erreur réseau';
                errorEl.classList.remove('hidden');
            }
        });

        // Check if already logged in
        fetch('/api/check-auth').then(res => {
            if (res.ok) window.location.href = '/admin/dashboard.html';
        });
    </script>
</body>
</html>
