<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Tableau de bord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f5f5f5] min-h-screen">
    <!-- Shield Script: Redirects immediately if not authorized -->
    <script>
        (async () => {
            try {
                const res = await fetch('/api/check-auth');
                if (!res.ok) window.location.href = '/admin/index.html';
                document.body.classList.remove('invisible');
            } catch {
                window.location.href = '/admin/index.html';
            }
        })();
    </script>
    <!-- Add 'invisible' class to avoid flashing content before auth check -->
    <script>document.body.className += ' invisible';</script>

    <nav class="bg-white border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-lg font-semibold text-[#1a1a1a]">Admin Dashboard</h1>
        <button id="logoutBtn" class="text-sm font-medium text-red-500 hover:text-red-600 transition-colors">Déconnexion</button>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Stat Card -->
            <div class="bg-white p-8 rounded-[24px] shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                <p class="text-xs font-semibold uppercase tracking-wider text-[#9e9e9e] mb-2">Visites totales</p>
                <p class="text-4xl font-light">12,482</p>
            </div>

            <!-- Content Card -->
            <div class="lg:col-span-2 bg-white p-8 rounded-[24px] shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                <h2 class="text-xl font-semibold mb-6">Gestion du contenu</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors cursor-pointer">
                        <span class="font-medium text-sm">Modifier la page d'accueil</span>
                        <span class="text-xs text-gray-400">Dernière modif: Hier</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            // Logout logic: Simple way is to expires the cookie via an API or just client side if not httpOnly
            // Since it's httpOnly, we should call a logout API or the server will ignore it.
            // For now, let's just clear session and redirect.
            // Better: An API that clears the cookie.
            await fetch('/api/logout');
            window.location.href = '/admin/index.html';
        });
    </script>
</body>
</html>
